[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/example]
width = 100%
height = 20pt
radius = 0
offset-x = 0
offset-y = 0
background = #88000000
foreground = ${colors.foreground}
line-size = 0pt
border-size = 0pt
border-color = #00000000
padding-left = 0
padding-right = 1
module-margin = 1
separator = 
separator-foreground = ${colors.disabled}
font-0 = monospace;4
font-1 = JetBrainsMono Nerd Font:size=10;4
modules-left = xworkspaces
modules-right = network filesystem pulseaudio xkeyboard cpu date
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = #88000000
label-active-foreground = #c678dd
label-active-underline= ${colors.primary}
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "󰕾 "
format-volume-prefix-foreground = #c5c8c6
format-volume = <label-volume>
label-volume = %percentage%%
label-volume-foreground = #c5c8c6
label-muted = 󰝟
label-muted-foreground = #c5c8c6

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = 󰌌 %layout%
label-layout-foreground = #c5c8c6

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = #c5c8c6
label-indicator-background = #00000000
format-padding =

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "%{T2}󰻠%{T-} "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%
label-foreground = ${colors.primary}

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98
format-charging = <label-charging>
format-discharging = <label-discharging>
label-charging = 󰂄 %percentage%%
label-discharging = 󰁺 %percentage%%
label-full = 󰁹 full
format-padding =

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
format-prefix = "󱑖 "
format-prefix-foreground = #c5c8c6
label = %date%
label-foreground = #c5c8c6

[settings]
screenchange-reload = true
pseudo-transparency = true

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
label-mounted = 󰋊 %percentage_used%%
label-mounted-foreground = ${colors.primary}
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}
format-padding =

[module/network]
type = custom/script
exec = if ping -c1 -W1 8.8.8.8 &>/dev/null; then echo "%{T1}󰤨 Online"; else echo "%{T1}󰤭 Offline"; fi
interval = 5
label-foreground = #c5c8c6
format-font = 2
format-padding = 
